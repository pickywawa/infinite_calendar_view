name: infinite_calendar_view
description: Easily build your different views of your calendar with this package. Month, week, multi days, one day, list ... and many features of the calendar widget.
version: 2.11.3
homepage: https://github.com/pickywawa/infinite_calendar_view
repository: https://github.com/pickywawa/infinite_calendar_view
issue_tracker: https://github.com/pickywawa/infinite_calendar_view/issues
topics:
  - calendar
  - schedule
  - planning
  - planner
  - week-view
screenshots:
  - description: InfiniteCalendarView days view demo
    path: readme_assets/showcase15.png
  - description: InfiniteCalendarView month view demo
    path: readme_assets/showcase13.png

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: any
  flutter_test:
    sdk: flutter
